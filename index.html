<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣天氣預報平台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>台灣天氣預報平台</h1>
      <p>即時查詢天氣因子與外出適宜分數</p>
    </div>
  </header>

  <main>
    <section class="panel" id="weather-panel">
      <h2>台灣天氣查詢</h2>
      <form id="weather-form">
        <label for="city-select">選擇台灣城市或縣市：</label>
        <div class="search-row">
          <select id="city-select" name="city" required></select>
          <button type="submit">查詢</button>
        </div>
        <label for="factor-select">選擇預報因子：</label>
        <div class="search-row">
          <select id="factor-select" name="factor" required></select>
        </div>
        <p class="hint">從下拉選單選擇行政區與預報因子後，系統會顯示因子預報與外出適宜分數。</p>
      </form>
      <div id="weather-result" class="result-card"></div>
      <div id="forecast-result" class="forecast-grid"></div>
      <div id="score-result" class="result-card"></div>
    </section>
  </main>

  <footer>
    <p>資料來源：中央氣象局開放資料（CWA）。實務使用請申請授權碼。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
